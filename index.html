<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Bubuuuuuu</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top left, #f8c6ff 0%, #d1a6ff 35%, #6c92ff 100%);
        color: #222;
      }
      .card {
        text-align: center;
        background: rgba(255, 255, 255, 0.92);
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 32px;
        padding: 36px 28px;
        box-shadow: 0 24px 60px rgba(28, 20, 60, 0.18);
        max-width: 640px;
        width: 100%;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 5vw, 4rem);
        letter-spacing: 0.08em;
      }
      p {
        margin: 0 0 24px;
        font-size: 1.2rem;
        line-height: 1.6;
        color: #4a3f5a;
      }
      .gif-wrapper {
        display: inline-flex;
        border-radius: 24px;
        overflow: hidden;
        border: 3px solid #fff;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }
      .gif-wrapper img {
        display: block;
        width: 100%;
        max-width: 520px;
        height: auto;
      }
      .sparkle {
        font-size: 0.95rem;
        color: #8c5bfa;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello Bubuuuuuu</h1>
      <div class="gif-wrapper">
        <img src="https://media.giphy.com/media/3o7abB06u9bNzA8lu8/giphy.gif" alt="Cute Bubu greeting GIF" />
      </div>
      <div class="sparkle">✨ Sending love, smiles and a big Bubuuuuuu hug! ✨</div>
    </div>
  </body>
</html>
